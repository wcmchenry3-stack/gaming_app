services:
  # --- Python FastAPI backend (dev environment) ---
  # The -dev suffix is explicit: this service tracks the `dev` branch.
  # A future prod environment should be a separate service (e.g.
  # `gaming-app-api`) pinned to `main`, with its own Postgres.
  - type: web
    name: gaming-app-api-dev
    runtime: python
    branch: dev
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # alembic runs before uvicorn on every boot so schema stays in sync with
    # models shipped on dev. It is idempotent — noop when already current.
    startCommand: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 5 --limit-max-requests 10000
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOWED_ORIGINS
        value: "https://dev-games.buffingchi.com,https://dev-games-api.buffingchi.com"
      - key: DATABASE_URL
        sync: false
      - key: SENTRY_DSN
        sync: false

  # --- Expo Web static frontend (dev environment) ---
  - type: web
    name: gaming-app-frontend-dev
    runtime: static
    branch: dev
    rootDir: frontend
    # fetch-render-env.js merges EXPO_PUBLIC_API_URL (and SENTRY_DSN if set)
    # into .env before Expo bakes them into the static bundle.
    buildCommand: npm ci && node scripts/fetch-render-env.js && npx expo export --platform web
    staticPublishPath: dist
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: "https://dev-games-api.buffingchi.com"
      - key: EXPO_PUBLIC_SENTRY_DSN
        sync: false
      # react-native-skia's postinstall downloads native binaries for all platforms.
      # This build only targets Expo Web; native binaries are not needed and the
      # download fails transiently on CDN errors. Skip it unconditionally.
      - key: SKIP_SKIA_DOWNLOAD
        value: "1"
    headers:
      - path: /*
        name: Content-Security-Policy
        # 'unsafe-inline' for script/style is required by Expo Web's output format (inlined styles
        # and event handlers). This is an accepted exception pending upstream Expo fix.
        value: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://dev-games-api.buffingchi.com https://dev-games.buffingchi.com; img-src 'self' data: blob:; font-src 'self' data:; frame-ancestors 'none'"
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
