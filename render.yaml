services:
  # --- Python FastAPI backend ---
  - type: web
    name: yahtzee-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 5 --limit-max-requests 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOWED_ORIGINS
        value: "https://games.buffingchi.com,https://yahtzee-frontend-l24f.onrender.com"

  # --- Expo Web static frontend ---
  - type: web
    name: yahtzee-frontend
    runtime: static
    rootDir: frontend
    # fetch-render-env.js queries the Render API for the API service's public URL
    # and writes EXPO_PUBLIC_API_URL to .env before Expo bakes it into the bundle.
    # RENDER_API_KEY must be set as a secret env var in the Render dashboard.
    buildCommand: npm ci && node scripts/fetch-render-env.js && npx expo export --platform web
    staticPublishPath: dist
    envVars:
      - key: EXPO_PUBLIC_API_URL
        fromService:
          name: yahtzee-api
          type: web
          property: host
      - key: RENDER_API_SERVICE_NAME
        value: yahtzee-api
      - key: RENDER_API_KEY
        sync: false
    headers:
      - path: /*
        name: Content-Security-Policy
        # 'unsafe-inline' for script/style is required by Expo Web's output format (inlined styles
        # and event handlers). This is an accepted exception pending upstream Expo fix.
        value: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://yahtzee-api.onrender.com https://games.buffingchi.com; img-src 'self' data: blob:; font-src 'self' data:; frame-ancestors 'none'"
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
