[tool.pytest.ini_options]
markers = [
    "security: security-focused tests (CORS, headers, injection)",
]
testpaths = ["tests"]
addopts = "--cov=. --cov-report=term-missing --cov-fail-under=80"
asyncio_mode = "auto"

[tool.coverage.run]
omit = ["tests/*"]

[tool.black]
line-length = 100

[tool.ruff]
line-length = 100

[tool.ruff.lint]
ignore = [
    "E402",  # module-level import not at top — intentional in scripts that manipulate sys.path
]
