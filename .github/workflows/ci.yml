name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # === Tier 0: Hygiene gates (run immediately, must pass before tier 1) ====

  gate-main-source:
    uses: wcmchenry3-stack/.github/.github/workflows/called-gate-main-source.yml@main
    secrets: inherit

  secret-scan:
    uses: wcmchenry3-stack/.github/.github/workflows/called-secret-scan.yml@main
    secrets: inherit

  lint-python:
    uses: wcmchenry3-stack/.github/.github/workflows/called-lint-python.yml@main
    with:
      working-directory: backend
    secrets: inherit

  lint-frontend:
    uses: wcmchenry3-stack/.github/.github/workflows/called-lint-frontend.yml@main
    with:
      working-directory: frontend
    secrets: inherit

  # === Tier 1: Substantive fast checks (need lint + secret-scan) ===========

  backend-health:
    needs: [lint-python, lint-frontend, secret-scan]
    uses: wcmchenry3-stack/.github/.github/workflows/called-backend-health.yml@main
    with:
      # Direct Render origin intentionally used here instead of dev-games-api.buffingchi.com.
      # Cloudflare Bot Fight Mode blocks GHA runner IPs (Azure cloud ranges) before
      # the WAF skip rule fires — health checks must bypass the proxy.
      # See wcmchenry3-stack/.github#45.
      backend-url: "https://gaming-app-api-dev.onrender.com"
      health-path: "/health"
      probe-path: "/yacht/state"
      probe-expected-status: "400"
    secrets: inherit

  expo-compat:
    needs: [lint-python, lint-frontend, secret-scan]
    uses: wcmchenry3-stack/.github/.github/workflows/called-expo-compat.yml@main
    with:
      working-directory: frontend
    secrets: inherit

  sentry-check:
    needs: [lint-python, lint-frontend, secret-scan]
    uses: wcmchenry3-stack/.github/.github/workflows/called-sentry-check.yml@main
    with:
      working-directory: backend
    secrets:
      SENTRY_DSN: ${{ secrets.SENTRY_BC_GAMES }}

  local-path-check:
    needs: [lint-python, lint-frontend, secret-scan]
    uses: wcmchenry3-stack/.github/.github/workflows/called-local-path-check.yml@main
    with:
      scan-paths: "frontend/ios/GamingApp.xcodeproj,frontend/android"
      file-patterns: "*.pbxproj,*.xcconfig,*.gradle,*.properties"
    secrets: inherit

  test-python:
    needs: [lint-python, lint-frontend, secret-scan]
    uses: wcmchenry3-stack/.github/.github/workflows/called-test-python.yml@main
    with:
      working-directory: backend
    secrets: inherit

  test-frontend:
    needs: [lint-python, lint-frontend, secret-scan]
    uses: wcmchenry3-stack/.github/.github/workflows/called-test-frontend.yml@main
    with:
      working-directory: frontend
    secrets: inherit

  cve-python:
    needs: [lint-python, lint-frontend, secret-scan]
    uses: wcmchenry3-stack/.github/.github/workflows/called-cve-python.yml@main
    with:
      working-directory: backend
    secrets: inherit

  cve-frontend:
    needs: [lint-python, lint-frontend, secret-scan]
    uses: wcmchenry3-stack/.github/.github/workflows/called-cve-frontend.yml@main
    with:
      working-directory: frontend
    secrets: inherit

  detect-e2e-scope:
    name: Detect E2E scope
    needs: [lint-python, lint-frontend, secret-scan]
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.scope.outputs.projects }}
      label: ${{ steps.scope.outputs.label }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            yacht:
              - 'frontend/src/screens/GameScreen*'
              - 'frontend/src/components/Die*'
              - 'frontend/src/components/DiceRow*'
              - 'frontend/src/components/Scorecard*'
              - 'frontend/src/components/ScoreRow*'
              - 'frontend/src/game/yacht/**'
              - 'backend/games/yacht*'
            blackjack:
              - 'frontend/src/screens/BlackjackScreen*'
              - 'frontend/src/components/blackjack/**'
              - 'frontend/src/game/blackjack/**'
              - 'backend/games/blackjack*'
            twenty48:
              - 'frontend/src/screens/Twenty48Screen*'
              - 'frontend/src/components/twenty48/**'
              - 'frontend/src/game/twenty48/**'
              - 'backend/games/twenty48*'

            cascade:
              - 'frontend/src/screens/CascadeScreen*'
              - 'frontend/src/components/cascade/**'
              - 'frontend/src/game/cascade/**'
              - 'backend/games/cascade*'
            logstore:
              - 'frontend/src/game/_shared/eventStore*'
              - 'frontend/src/game/_shared/eventQueueConfig*'
              - 'frontend/src/game/_shared/gameEventClient*'
              - 'frontend/src/game/_shared/syncWorker*'
              - 'frontend/src/game/_shared/syncApi*'
              - 'frontend/src/game/_shared/pendingGamesStore*'
              - 'frontend/src/game/_shared/bugReportLimiter*'
              - 'frontend/src/game/_shared/testHooks*'
              - 'frontend/src/game/_shared/NetworkContext*'
              - 'backend/games/**'
              - 'backend/logs/**'
              - 'e2e/tests/logs-*.spec.ts'
              - 'e2e/tests/helpers/logstore*'
            shared:
              - 'frontend/App.tsx'
              - 'frontend/app.json'
              - 'frontend/src/theme/**'
              - 'frontend/src/components/OfflineBanner*'
              - 'frontend/src/components/LanguageSwitcher*'
              - 'backend/main.py'
              - 'e2e/**'
              - '.github/workflows/**'

      - id: scope
        run: |
          # Push events or PRs targeting main always run the full suite
          if [[ "${{ github.event_name }}" == "push" ]] || \
             [[ "${{ github.base_ref }}" == "main" ]] || \
             [[ "${{ steps.filter.outputs.shared }}" == "true" ]]; then
            echo "projects=yacht blackjack twenty48 cascade cross logs-budget" >> "$GITHUB_OUTPUT"
            echo "label=full suite (push/main/shared change)" >> "$GITHUB_OUTPUT"
          else
            projects="cross"
            [[ "${{ steps.filter.outputs.yacht }}"     == "true" ]] && projects="$projects yacht"
            [[ "${{ steps.filter.outputs.blackjack }}" == "true" ]] && projects="$projects blackjack"
            [[ "${{ steps.filter.outputs.twenty48 }}"  == "true" ]] && projects="$projects twenty48"

            [[ "${{ steps.filter.outputs.cascade }}"   == "true" ]] && projects="$projects cascade"
            [[ "${{ steps.filter.outputs.logstore }}"  == "true" ]] && projects="$projects logs-budget"
            echo "projects=$projects" >> "$GITHUB_OUTPUT"
            echo "label=selective: $projects" >> "$GITHUB_OUTPUT"
          fi

  e2e:
    name: Playwright E2E
    needs: [test-python, test-frontend, detect-e2e-scope]
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build Expo web
        run: npx expo export --platform web
        working-directory: frontend
        env:
          EXPO_PUBLIC_API_URL: http://localhost:8000
          EXPO_PUBLIC_TEST_HOOKS: "1"

      - name: Install E2E deps
        run: npm ci
        working-directory: e2e

      - name: Run Playwright tests (${{ needs.detect-e2e-scope.outputs.label }})
        run: |
          PROJECTS="${{ needs.detect-e2e-scope.outputs.projects }}"
          ARGS=""
          for p in $PROJECTS; do ARGS="$ARGS --project $p"; done
          npx playwright test $ARGS
        working-directory: e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 7

  check-i18n:
    name: i18n completeness check
    needs: [lint-python, lint-frontend, secret-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend
      - name: Check all locale strings are translated
        run: node scripts/check-i18n-strings.js
        working-directory: frontend

  openai-policy:
    needs: [lint-python, lint-frontend, secret-scan]
    uses: wcmchenry3-stack/.github/.github/workflows/called-openai-policy.yml@main
    secrets: inherit

  feedback-token-lint:
    needs: [lint-python, lint-frontend, secret-scan]
    uses: wcmchenry3-stack/.github/.github/workflows/called-feedback-token-lint.yml@main
    secrets: inherit

  provenance-coverage:
    needs: [lint-python, lint-frontend, secret-scan]
    uses: wcmchenry3-stack/.github/.github/workflows/called-provenance-coverage.yml@main
    secrets: inherit

  # --- Android JS bundle validation (Linux, fast) ---------------------------
  # Catches silent bundling failures BEFORE they reach EAS Build.
  # The Android build check below only compiles in Debug mode (skips bundling),
  # so it cannot detect issues with the JS bundler or entry-point resolution.

  android-bundle-check:
    needs: [lint-python, lint-frontend, secret-scan]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Create Android JS bundle
        run: |
          mkdir -p dist
          ENTRY_FILE=$(node -e "require('expo/scripts/resolveAppEntry')" . android absolute | tail -n 1)
          npx expo export:embed \
            --platform android \
            --dev false \
            --entry-file "$ENTRY_FILE" \
            --bundle-output dist/index.android.bundle \
            --assets-dest /tmp/assets
      - name: Validate bundle
        run: |
          if [ ! -f dist/index.android.bundle ]; then
            echo "::error::index.android.bundle was not created — the Android app will crash on launch"
            exit 1
          fi
          BUNDLE_SIZE=$(stat --printf="%s" dist/index.android.bundle)
          if [ "$BUNDLE_SIZE" -lt 1000 ]; then
            echo "::error::index.android.bundle is only ${BUNDLE_SIZE} bytes — likely corrupted"
            exit 1
          fi
          BUNDLE_SIZE_MB=$(awk "BEGIN {printf \"%.2f\", $BUNDLE_SIZE / 1048576}")
          MAX_BYTES=5242880
          if [ "$BUNDLE_SIZE" -gt "$MAX_BYTES" ]; then
            echo "::error::JS bundle exceeds 5 MB hard limit: ${BUNDLE_SIZE_MB} MB (${BUNDLE_SIZE} bytes). See docs/PERFORMANCE.md for how to update the limit."
            exit 1
          fi
          echo "Android JS bundle: ${BUNDLE_SIZE_MB} MB (${BUNDLE_SIZE} bytes) — within 5 MB limit"
          echo "BUNDLE_SIZE_BYTES=$BUNDLE_SIZE" >> "$GITHUB_ENV"
          echo "BUNDLE_SIZE_MB=$BUNDLE_SIZE_MB" >> "$GITHUB_ENV"
      - name: Check bundle size (bundlesize)
        run: npx bundlesize
      - name: Post bundle size comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASELINE_BYTES=4718592
          DELTA_BYTES=$(( BUNDLE_SIZE_BYTES - BASELINE_BYTES ))
          if [ "$DELTA_BYTES" -gt 0 ]; then
            DELTA_STR="+$(awk "BEGIN {printf \"%.0f\", $DELTA_BYTES / 1024}") KB"
          else
            DELTA_STR="$(awk "BEGIN {printf \"%.0f\", $DELTA_BYTES / 1024}") KB"
          fi
          COMMENT="### Bundle size report
          | | Size |
          |---|---|
          | JS bundle (Hermes, Android) | ${BUNDLE_SIZE_MB} MB |
          | Delta vs 4.5 MB baseline | ${DELTA_STR} |
          | Hard limit | 5.0 MB |

          _Measured from \`dist/index.android.bundle\` (uncompressed Hermes bytecode). See [PERFORMANCE.md](../blob/${GITHUB_HEAD_REF}/docs/PERFORMANCE.md#js-bundle-size-guardrail) for details._"
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$COMMENT" \
            --edit-last 2>/dev/null || \
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$COMMENT"

  # === Tier 2: Expensive checks (need unit tests; skipped on feat→dev) =====
  # iOS/Android build checks run only on PRs targeting main or pushes to main.
  # Closes #423: skip on feat→dev PRs to save macOS minutes.

  ios-build-check:
    if: github.base_ref == 'main' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [test-python, test-frontend]
    uses: wcmchenry3-stack/.github/.github/workflows/called-ios-build-check.yml@main
    with:
      working-directory: frontend
      workspace-name: "GamingApp.xcworkspace"
      scheme: "GamingApp"
    secrets: inherit

  android-build-check:
    if: github.base_ref == 'main' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [test-python, test-frontend]
    uses: wcmchenry3-stack/.github/.github/workflows/called-android-build-check.yml@main
    with:
      working-directory: frontend
    secrets: inherit

  # Android release smoke test — path-filtered, runs on PRs only.
  # The debug build check cannot catch release-only failures (Sentry upload,
  # release CMake config, ProGuard). Runs assembleRelease for a single ABI.

  android-release-smoke:
    if: github.event_name == 'pull_request'
    needs: [test-python, test-frontend]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect Android-relevant changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}"...HEAD)
          if echo "$CHANGED" | grep -qE 'frontend/android/|frontend/package\.json|frontend/package-lock\.json'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Android-relevant file changes — skipping release smoke test"
          fi

      - uses: actions/setup-java@v4
        if: steps.changes.outputs.should_run == 'true'
        with:
          distribution: zulu
          java-version: 17

      - uses: actions/setup-node@v6
        if: steps.changes.outputs.should_run == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install JS dependencies
        if: steps.changes.outputs.should_run == 'true'
        run: npm ci

      - name: Generate debug keystore for smoke test
        if: steps.changes.outputs.should_run == 'true'
        run: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Release build smoke test (arm64-v8a only)
        if: steps.changes.outputs.should_run == 'true'
        run: |
          cd android
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            -PUPLOAD_STORE_FILE=debug.keystore \
            -PUPLOAD_STORE_PASSWORD=android \
            -PUPLOAD_KEY_ALIAS=androiddebugkey \
            -PUPLOAD_KEY_PASSWORD=android \
            --no-daemon
        # No SENTRY_AUTH_TOKEN: sentry.gradle skips source-map upload when the
        # token is absent, so the smoke test validates the build chain only.
        # Signing is overridden to use the generated debug.keystore so the
        # production upload-keystore.jks (gitignored) is not required in CI.
        # gradle.properties sets UPLOAD_STORE_FILE=../upload-keystore.jks which
        # would fail; these -P flags take precedence over gradle.properties.

  # --- Phase 9: Sentry CLI auth validation (Linux, fast) --------------------
  # Catches expired or misconfigured Sentry auth tokens before they break
  # release builds. Runs only when Sentry config or the token may be affected.

  sentry-cli-check:
    if: github.event_name == 'pull_request'
    needs: [lint-python, lint-frontend, secret-scan]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Sentry CLI auth
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "::warning::SENTRY_AUTH_TOKEN secret is not set — release builds will skip source map upload"
            exit 0
          fi
          npx sentry-cli info
          echo "Sentry CLI authenticated successfully"
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: buffing-chi
          SENTRY_PROJECT: react-native

  # --- Phase 10: Gradle wrapper + dependency version gate -------------------
  # Validates the Gradle wrapper JAR checksum to prevent supply-chain attacks.
  # Also flags dependency version changes that warrant a full release build test.

  gradle-wrapper-check:
    if: github.event_name == 'pull_request'
    needs: [lint-python, lint-frontend, secret-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Check Gradle build file consistency
        run: |
          CHANGED_FILES=$(git diff --name-only "${{ github.event.pull_request.base.sha }}"...HEAD)
          if echo "$CHANGED_FILES" | grep -qE 'frontend/android/(app/)?build\.gradle|frontend/android/settings\.gradle'; then
            echo "::notice::Android Gradle build files changed — ensure gradle.properties settings (SDK versions, Hermes, architectures) are still correct."
          fi
          if echo "$CHANGED_FILES" | grep -qE 'frontend/android/gradle\.properties|frontend/android/gradle/wrapper/gradle-wrapper\.properties'; then
            echo "::warning::Gradle or wrapper version changed — verify android-release-smoke passes before merging."
          fi
          if echo "$CHANGED_FILES" | grep -qE 'frontend/package\.json'; then
            echo "::notice::package.json changed — native module versions may have shifted. Check android-release-smoke and android-build-check results."
          fi
          echo "Gradle wrapper validation passed"
