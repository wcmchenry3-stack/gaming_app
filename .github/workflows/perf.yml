name: Performance Tests

on:
  # Nightly against production
  schedule:
    - cron: '0 6 * * *'

  # On-demand with configurable parameters
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Backend URL to test'
        required: true
        default: 'https://yahtzee-api.onrender.com'
      users:
        description: 'Concurrent users (leaderboard scenario)'
        required: true
        default: '10'
      run_time:
        description: 'Test duration (e.g. 60s, 2m)'
        required: true
        default: '60s'

  # Callable by deploy.yml post-deploy (informational only)
  workflow_call:
    inputs:
      target_url:
        type: string
        required: false
        default: 'https://yahtzee-api.onrender.com'

# No PR trigger — perf tests are never a merge gate.

env:
  DEFAULT_TARGET_URL: 'https://yahtzee-api.onrender.com'

jobs:
  warm-up:
    name: Wake Render service
    runs-on: ubuntu-latest
    outputs:
      target_url: ${{ steps.resolve-url.outputs.url }}
    steps:
      - name: Resolve target URL
        id: resolve-url
        run: |
          URL="${{ inputs.target_url || env.DEFAULT_TARGET_URL }}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Wake Render free-tier instance
        run: |
          URL="${{ steps.resolve-url.outputs.url }}"
          echo "Warming up $URL ..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL/game/state" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" != "000" ] && [ "$STATUS" != "503" ]; then
              echo "Service is up."
              exit 0
            fi
            sleep 15
          done
          echo "WARNING: Service did not respond after 5 attempts. Proceeding anyway."

  backend-perf:
    name: Backend load test (Locust)
    runs-on: ubuntu-latest
    needs: warm-up
    continue-on-error: true   # Never block — informational only
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install Locust
        run: pip install locust==2.32.4

      - name: Run Locust — game flow (1 user, sequential)
        working-directory: backend
        env:
          TARGET_URL: ${{ needs.warm-up.outputs.target_url }}
        run: |
          locust -f perf/locustfile.py \
            --headless \
            --users 1 \
            --spawn-rate 1 \
            --run-time 90s \
            --host "$TARGET_URL" \
            --csv perf-gameflow \
            --exit-code-on-error 0 \
            YahtzeeGameUser
          echo "Game flow run complete."

      - name: Run Locust — leaderboard concurrent
        working-directory: backend
        env:
          TARGET_URL: ${{ needs.warm-up.outputs.target_url }}
        run: |
          locust -f perf/locustfile.py \
            --headless \
            --users ${{ inputs.users || '10' }} \
            --spawn-rate 2 \
            --run-time ${{ inputs.run_time || '60s' }} \
            --host "$TARGET_URL" \
            --csv perf-leaderboard \
            --exit-code-on-error 0 \
            LeaderboardUser
          echo "Leaderboard run complete."

      - name: Run Locust — read-only polling
        working-directory: backend
        env:
          TARGET_URL: ${{ needs.warm-up.outputs.target_url }}
        run: |
          locust -f perf/locustfile.py \
            --headless \
            --users 20 \
            --spawn-rate 5 \
            --run-time ${{ inputs.run_time || '60s' }} \
            --host "$TARGET_URL" \
            --csv perf-readonly \
            --exit-code-on-error 0 \
            ReadOnlyUser
          echo "Read-only polling run complete."

      - name: Check thresholds
        working-directory: backend
        run: |
          # Merge CSVs under a common prefix for threshold checker
          python perf/check_thresholds.py --csv perf-gameflow   || FAILED=1
          python perf/check_thresholds.py --csv perf-leaderboard || FAILED=1
          python perf/check_thresholds.py --csv perf-readonly    || FAILED=1
          if [ "${FAILED:-0}" = "1" ]; then
            echo "::warning::Performance thresholds were breached. See artifacts for details."
          fi

      - name: Upload Locust results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-results-${{ github.run_id }}
          path: |
            backend/perf-gameflow*.csv
            backend/perf-leaderboard*.csv
            backend/perf-readonly*.csv
          retention-days: 30

  frontend-perf:
    name: Frontend Lighthouse CI
    runs-on: ubuntu-latest
    continue-on-error: true   # Never block — informational only
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Expo web
        working-directory: frontend
        env:
          EXPO_PUBLIC_API_URL: 'https://yahtzee-api.onrender.com'
        run: npx expo export --platform web

      - name: Run Lighthouse CI
        working-directory: frontend
        run: npx lhci autorun --config=lighthouserc.json
        continue-on-error: true

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results-${{ github.run_id }}
          path: frontend/.lighthouseci/
          retention-days: 30
